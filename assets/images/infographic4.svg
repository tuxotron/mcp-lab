<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Scenario 4 infographic: Ollama agent using secure MCP tools</title>
  <desc id="desc">A teaching diagram showing an Ollama agent discovering tools from a secure MCP server, converting MCP tool schemas into Ollama tool definitions, calling tools through the FastMCP client, and sending results back to the model.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 800 54px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 25px Arial, sans-serif; fill: #566174; }
      .label { font: 700 25px Arial, sans-serif; fill: #172033; }
      .body { font: 400 22px Arial, sans-serif; fill: #3f4858; }
      .mono { font: 700 20px Menlo, Consolas, monospace; fill: #15304f; }
      .small { font: 400 19px Arial, sans-serif; fill: #566174; }
      .pill { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d9e0ea; stroke-width: 3; rx: 24; }
      .agent { fill: #e5f0ff; stroke: #4c8ed9; }
      .schema { fill: #f2e7ff; stroke: #8657c8; }
      .idp { fill: #ffe7df; stroke: #d95c4f; }
      .server { fill: #e9f7ef; stroke: #35a56a; }
      .result { fill: #fff1d6; stroke: #d28c1f; }
      .line { fill: none; stroke: #59677c; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #59677c; stroke-width: 4; stroke-dasharray: 14 12; stroke-linecap: round; }
      .num { font: 800 24px Arial, sans-serif; fill: #ffffff; }
      .dark { fill: #172033; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#59677c"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <rect x="70" y="58" width="1460" height="884" rx="36" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
  <rect x="100" y="92" width="170" height="44" rx="22" fill="#245f9f"/>
  <text x="185" y="122" text-anchor="middle" class="pill">Scenario 4</text>
  <text x="100" y="196" class="title">Ollama Agent Uses Secure MCP Tools</text>
  <text x="100" y="236" class="subtitle">The local model does not know the tools upfront; the client discovers MCP tools and exposes them as Ollama function schemas.</text>

  <rect x="115" y="320" width="315" height="230" class="panel agent"/>
  <text x="272" y="374" text-anchor="middle" class="label">Ollama Model</text>
  <text x="272" y="420" text-anchor="middle" class="mono">OLLAMA_MODEL</text>
  <text x="272" y="460" text-anchor="middle" class="body">decides tool calls</text>
  <text x="272" y="496" text-anchor="middle" class="body">produces final answer</text>

  <rect x="515" y="288" width="365" height="295" class="panel schema"/>
  <text x="698" y="342" text-anchor="middle" class="label">Agent Orchestrator</text>
  <text x="698" y="386" text-anchor="middle" class="mono">list_tools()</text>
  <text x="698" y="424" text-anchor="middle" class="mono">mcp_tools_to_ollama()</text>
  <text x="698" y="462" text-anchor="middle" class="mono">client.call_tool()</text>
  <text x="698" y="515" text-anchor="middle" class="small">bridges two tool formats</text>

  <rect x="985" y="210" width="300" height="150" class="panel idp"/>
  <text x="1135" y="265" text-anchor="middle" class="label">Keycloak</text>
  <text x="1135" y="308" text-anchor="middle" class="body">issues ID token</text>

  <rect x="1030" y="455" width="430" height="240" class="panel server"/>
  <text x="1245" y="510" text-anchor="middle" class="label">Secure MCP Server</text>
  <text x="1245" y="552" text-anchor="middle" class="mono">whoami</text>
  <text x="1245" y="590" text-anchor="middle" class="mono">hello</text>
  <text x="1245" y="628" text-anchor="middle" class="mono">admin_only_demo</text>
  <text x="1245" y="666" text-anchor="middle" class="small">checks bearer token and roles</text>

  <rect x="365" y="670" width="575" height="120" class="panel result"/>
  <text x="652" y="718" text-anchor="middle" class="label">Tool Result Message</text>
  <text x="652" y="758" text-anchor="middle" class="mono">{"ok": true, "tool": name, "data": result}</text>

  <path class="line" marker-end="url(#arrow)" d="M430 410 H510"/>
  <path class="dash" marker-end="url(#arrow)" d="M515 500 H435"/>
  <path class="line" marker-end="url(#arrow)" d="M880 345 C940 290 965 285 980 285"/>
  <path class="dash" marker-end="url(#arrow)" d="M985 325 C930 392 895 430 883 458"/>
  <path class="line" marker-end="url(#arrow)" d="M880 500 H1025"/>
  <path class="dash" marker-end="url(#arrow)" d="M1030 635 C995 715 965 725 945 730"/>
  <path class="line" marker-end="url(#arrow)" d="M365 730 C285 690 250 610 260 555"/>

  <circle cx="470" cy="410" r="24" class="dark"/><text x="470" y="419" text-anchor="middle" class="num">1</text>
  <circle cx="470" cy="500" r="24" class="dark"/><text x="470" y="509" text-anchor="middle" class="num">2</text>
  <circle cx="930" cy="320" r="24" class="dark"/><text x="930" y="329" text-anchor="middle" class="num">3</text>
  <circle cx="955" cy="500" r="24" class="dark"/><text x="955" y="509" text-anchor="middle" class="num">4</text>
  <circle cx="990" cy="680" r="24" class="dark"/><text x="990" y="689" text-anchor="middle" class="num">5</text>
  <circle cx="304" cy="650" r="24" class="dark"/><text x="304" y="659" text-anchor="middle" class="num">6</text>

  <rect x="145" y="845" width="1310" height="70" rx="22" fill="#f1f5fa" stroke="#d9e0ea" stroke-width="3"/>
  <text x="180" y="890" class="body">Teaching focus: Scenario 4 combines every prior idea: LLM tool choice, MCP discovery, HTTP transport, bearer-token authentication, and role-aware server behavior.</text>
</svg>
