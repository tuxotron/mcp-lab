<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Scenario 2 infographic: MCP over streamable HTTP</title>
  <desc id="desc">A teaching diagram showing a FastMCP HTTP client connecting to an MCP endpoint, listing tools, and calling multiply and greet over a network transport without authentication.</desc>
  <defs>
    <style>
      .bg { fill: #fbf9f5; }
      .title { font: 800 54px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 25px Arial, sans-serif; fill: #566174; }
      .label { font: 700 25px Arial, sans-serif; fill: #172033; }
      .body { font: 400 22px Arial, sans-serif; fill: #3f4858; }
      .mono { font: 700 21px Menlo, Consolas, monospace; fill: #15304f; }
      .small { font: 400 19px Arial, sans-serif; fill: #566174; }
      .pill { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d9e0ea; stroke-width: 3; rx: 24; }
      .client { fill: #e5f0ff; stroke: #4c8ed9; }
      .server { fill: #e9f7ef; stroke: #35a56a; }
      .net { fill: #f2e7ff; stroke: #8657c8; }
      .warn { fill: #fff1d6; stroke: #d28c1f; }
      .tool { fill: #ffffff; stroke: #b8c4d4; stroke-width: 3; rx: 18; }
      .line { fill: none; stroke: #59677c; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #59677c; stroke-width: 4; stroke-dasharray: 14 12; stroke-linecap: round; }
      .num { font: 800 24px Arial, sans-serif; fill: #ffffff; }
      .dark { fill: #172033; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#59677c"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1000"/>
  <rect x="70" y="58" width="1460" height="884" rx="36" fill="#ffffff" stroke="#dfe5ee" stroke-width="3"/>
  <rect x="100" y="92" width="170" height="44" rx="22" fill="#8657c8"/>
  <text x="185" y="122" text-anchor="middle" class="pill">Scenario 2</text>
  <text x="100" y="196" class="title">MCP over Streamable HTTP</text>
  <text x="100" y="236" class="subtitle">The same tool protocol is now reachable at a URL, so the client and server can run independently.</text>

  <rect x="125" y="330" width="330" height="250" class="panel client"/>
  <text x="290" y="386" text-anchor="middle" class="label">HTTP Client</text>
  <text x="290" y="431" text-anchor="middle" class="mono">Client(MCP_URL)</text>
  <text x="290" y="474" text-anchor="middle" class="body">list_tools()</text>
  <text x="290" y="510" text-anchor="middle" class="body">call_tool(...)</text>

  <rect x="585" y="305" width="430" height="300" class="panel net"/>
  <text x="800" y="360" text-anchor="middle" class="label">Network Boundary</text>
  <text x="800" y="408" text-anchor="middle" class="mono">http://127.0.0.1:8000/mcp</text>
  <path class="line" marker-end="url(#arrow)" d="M650 465 H950"/>
  <path class="dash" marker-end="url(#arrow)" d="M950 525 H650"/>
  <text x="800" y="455" text-anchor="middle" class="small">request</text>
  <text x="800" y="560" text-anchor="middle" class="small">response / stream</text>

  <rect x="1145" y="315" width="330" height="275" class="panel server"/>
  <text x="1310" y="370" text-anchor="middle" class="label">FastMCP Server</text>
  <text x="1310" y="412" text-anchor="middle" class="mono">mcp.run(http)</text>
  <rect x="1190" y="455" width="240" height="50" class="tool"/>
  <text x="1310" y="487" text-anchor="middle" class="mono">multiply(a, b)</text>
  <rect x="1190" y="525" width="240" height="50" class="tool"/>
  <text x="1310" y="557" text-anchor="middle" class="mono">greet(name)</text>

  <path class="line" marker-end="url(#arrow)" d="M455 455 H580"/>
  <path class="line" marker-end="url(#arrow)" d="M1015 455 H1140"/>
  <path class="dash" marker-end="url(#arrow)" d="M1145 535 H1020"/>
  <path class="dash" marker-end="url(#arrow)" d="M585 535 H460"/>
  <circle cx="520" cy="455" r="24" class="dark"/><text x="520" y="464" text-anchor="middle" class="num">1</text>
  <circle cx="1080" cy="455" r="24" class="dark"/><text x="1080" y="464" text-anchor="middle" class="num">2</text>
  <circle cx="1080" cy="535" r="24" class="dark"/><text x="1080" y="544" text-anchor="middle" class="num">3</text>
  <circle cx="520" cy="535" r="24" class="dark"/><text x="520" y="544" text-anchor="middle" class="num">4</text>

  <rect x="145" y="718" width="640" height="124" rx="22" class="warn"/>
  <text x="180" y="765" class="label">New idea</text>
  <text x="180" y="806" class="body">MCP is now a service endpoint.</text>
  <text x="180" y="848" class="small">That enables remote access, but creates security questions.</text>
  <rect x="815" y="718" width="640" height="124" rx="22" fill="#f1f5fa" stroke="#d9e0ea" stroke-width="3"/>
  <text x="850" y="765" class="label">Teaching focus</text>
  <text x="850" y="806" class="body">Transport changes; tool semantics stay the same.</text>
  <text x="850" y="848" class="small">Compare this with Scenario 1's local process boundary.</text>
</svg>
